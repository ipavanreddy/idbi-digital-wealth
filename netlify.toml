# Netlify config — Wealth Avatar (IDBI Innovate 2026, Track 1)
# The app is a fully static Next.js export (see next.config.mjs `output: "export"`).
# No plugins or server runtime needed; Netlify just builds and serves `out/`.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Serve the 404 page Next.js generates for unknown paths.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
